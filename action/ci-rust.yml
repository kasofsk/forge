# Forgejo Actions workflow: Rust CI on pull requests
#
# Runs format check and clippy (tests temporarily disabled).

name: Rust CI

on:
  pull_request:

jobs:
  ci:
    runs-on: rust
    steps:
      - uses: actions/checkout@v4
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
