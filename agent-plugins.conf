# Agent plugin configuration — installed into agent Docker images at build time.
#
# Format: github_owner/repo:plugin1,plugin2
#   - Each line is a marketplace GitHub repo
#   - After the colon, comma-separated plugin names to install
#   - Empty plugin list (or omitted colon) installs ALL plugins from that marketplace
#   - Lines starting with # are comments
#
# Examples:
#   kasofsk/claude-plugins                          # install all plugins
#   kasofsk/claude-plugins:rust-lint                # install only rust-lint
#   kasofsk/claude-plugins:rust-lint,check-duplication  # install two plugins
#   other-org/other-plugins:foo,bar                 # multiple marketplaces supported

kasofsk/claude-plugins:rust-lint,check-duplication
